<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="40" fill="#F5F7FA"/>
  <rect x="54" y="54" width="1492" height="792" rx="32" fill="white"/>
  <rect x="110" y="104" width="280" height="160" rx="28" fill="#0F172A"/>
  <text x="150" y="168" fill="white" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700">User</text>
  <text x="150" y="206" fill="#CBD5E1" font-family="Avenir Next, Segoe UI, sans-serif" font-size="20">Email or wallet sign-in</text>
  <text x="150" y="236" fill="#CBD5E1" font-family="Avenir Next, Segoe UI, sans-serif" font-size="20">Create and run agents</text>

  <rect x="480" y="88" width="646" height="520" rx="32" fill="#FFF7F7" stroke="#F3D2D2" stroke-width="2"/>
  <text x="520" y="142" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="34" font-weight="700">Agent Passport App</text>
  <text x="520" y="178" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="21">Next.js app on Vercel with a clean product layer around the trust protocol.</text>

  <rect x="520" y="220" width="270" height="150" rx="24" fill="white" stroke="#E4E7EC" stroke-width="2"/>
  <text x="548" y="274" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="25" font-weight="700">Frontend</text>
  <text x="548" y="312" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Marketing pages</text>
  <text x="548" y="340" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Dashboard shell</text>

  <rect x="816" y="220" width="270" height="150" rx="24" fill="white" stroke="#E4E7EC" stroke-width="2"/>
  <text x="844" y="274" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="25" font-weight="700">API Routes</text>
  <text x="844" y="312" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">/agents</text>
  <text x="844" y="340" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">/run, /log, /trust</text>

  <rect x="520" y="404" width="566" height="160" rx="24" fill="#111827"/>
  <text x="552" y="460" fill="white" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" font-weight="700">What the app keeps off-chain</text>
  <text x="552" y="498" fill="#D0D5DD" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">User rows, agent metadata, prompts, run state, and UX-friendly progress live in the app database.</text>
  <text x="552" y="532" fill="#D0D5DD" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">That keeps the product fast while still preserving a public source of truth for trust.</text>

  <rect x="1180" y="104" width="280" height="190" rx="28" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/>
  <text x="1212" y="164" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700">Supabase</text>
  <text x="1212" y="204" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">users</text>
  <text x="1212" y="232" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">agents</text>
  <text x="1212" y="260" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">action_runs</text>

  <rect x="1180" y="330" width="280" height="190" rx="28" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/>
  <text x="1212" y="390" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="700">Thirdweb + LLM</text>
  <text x="1212" y="430" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Email and wallet auth</text>
  <text x="1212" y="458" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Embedded wallets</text>
  <text x="1212" y="486" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Reasoning and retrieval</text>

  <rect x="104" y="622" width="1348" height="168" rx="28" fill="#0A1220"/>
  <text x="146" y="684" fill="white" font-family="Avenir Next, Segoe UI, sans-serif" font-size="30" font-weight="700">Avalanche Fuji holds the trust boundary</text>
  <text x="146" y="726" fill="#E4E7EC" font-family="Avenir Next, Segoe UI, sans-serif" font-size="21">Agent passports, ownership links, wallet identity, and action receipts are public and independently verifiable.</text>
  <text x="146" y="760" fill="#E4E7EC" font-family="Avenir Next, Segoe UI, sans-serif" font-size="21">Even if the app disappears, a website or auditor can still verify what the agent did.</text>

  <rect x="1080" y="640" width="340" height="118" rx="22" fill="#FFFFFF"/>
  <text x="1110" y="690" fill="#101828" font-family="Avenir Next, Segoe UI, sans-serif" font-size="23" font-weight="700">On-chain artifacts</text>
  <text x="1110" y="724" fill="#475467" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18">AgentPassport, ActionLog, agent wallet</text>

  <path d="M390 184H452" stroke="#E84142" stroke-width="6" stroke-linecap="round"/>
  <path d="M1126 184H1162" stroke="#E84142" stroke-width="6" stroke-linecap="round"/>
  <path d="M1126 424H1162" stroke="#E84142" stroke-width="6" stroke-linecap="round"/>
  <path d="M802 608V562" stroke="#E84142" stroke-width="6" stroke-linecap="round"/>
  <circle cx="452" cy="184" r="10" fill="#E84142"/>
  <circle cx="1162" cy="184" r="10" fill="#E84142"/>
  <circle cx="1162" cy="424" r="10" fill="#E84142"/>
  <circle cx="802" cy="562" r="10" fill="#E84142"/>

  <text x="110" y="824" fill="#98A2B3" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18">Agent Passport architecture diagram for the marketing and README surfaces.</text>
</svg>
